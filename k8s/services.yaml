apiVersion: v1
kind: Service
metadata:
  name: ops-sentinel-core-service
  namespace: ops-sentinel
  labels:
    app: ops-sentinel
    component: core
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  - port: 8090
    targetPort: 8090
    protocol: TCP
    name: metrics
  selector:
    app: ops-sentinel
    component: core
---
apiVersion: v1
kind: Service
metadata:
  name: ops-sentinel-dashboard-service
  namespace: ops-sentinel
  labels:
    app: ops-sentinel
    component: dashboard
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: ops-sentinel
    component: dashboard
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: ops-sentinel
  labels:
    app: redis
spec:
  type: ClusterIP
  ports:
  - port: 6379
    targetPort: 6379
    protocol: TCP
  selector:
    app: redis
---
apiVersion: v1
kind: Service
metadata:
  name: influxdb-service
  namespace: ops-sentinel
  labels:
    app: influxdb
spec:
  type: ClusterIP
  ports:
  - port: 8086
    targetPort: 8086
    protocol: TCP
  selector:
    app: influxdb
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: ops-sentinel
  labels:
    app: grafana
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
  selector:
    app: grafana