apiVersion: apps/v1
kind: Deployment
metadata:
  name: ops-sentinel-core
  namespace: ops-sentinel
  labels:
    app: ops-sentinel
    component: core
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ops-sentinel
      component: core
  template:
    metadata:
      labels:
        app: ops-sentinel
        component: core
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: ops-sentinel
      containers:
      - name: core
        image: ops-sentinel/core:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 8090
          name: metrics
        env:
        - name: REDIS_HOST
          value: "redis-service"
        - name: REDIS_PORT
          value: "6379"
        - name: INFLUXDB_HOST
          value: "influxdb-service"
        - name: INFLUXDB_PORT
          value: "8086"
        - name: LOG_LEVEL
          value: "INFO"
        - name: KUBERNETES_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: config
          mountPath: /etc/ops-sentinel
        - name: scripts
          mountPath: /usr/local/bin
        - name: temp
          mountPath: /tmp
      volumes:
      - name: config
        configMap:
          name: ops-sentinel-config
      - name: scripts
        configMap:
          name: ops-sentinel-scripts
          defaultMode: 0755
      - name: temp
        emptyDir: {}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ops-sentinel-agent
  namespace: ops-sentinel
  labels:
    app: ops-sentinel
    component: agent
spec:
  selector:
    matchLabels:
      app: ops-sentinel
      component: agent
  template:
    metadata:
      labels:
        app: ops-sentinel
        component: agent
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "9100"
    spec:
      hostNetwork: true
      hostPID: true
      containers:
      - name: agent
        image: ops-sentinel/agent:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 9100
          name: metrics
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: REDIS_HOST
          value: "redis-service.ops-sentinel.svc.cluster.local"
        - name: COLLECT_INTERVAL
          value: "30s"
        securityContext:
          privileged: true
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        volumeMounts:
        - name: proc
          mountPath: /host/proc
          readOnly: true
        - name: sys
          mountPath: /host/sys
          readOnly: true
        - name: rootfs
          mountPath: /rootfs
          readOnly: true
        - name: dev
          mountPath: /host/dev
          readOnly: true
      volumes:
      - name: proc
        hostPath:
          path: /proc
      - name: sys
        hostPath:
          path: /sys
      - name: rootfs
        hostPath:
          path: /
      - name: dev
        hostPath:
          path: /dev
      tolerations:
      - operator: Exists
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ops-sentinel-dashboard
  namespace: ops-sentinel
  labels:
    app: ops-sentinel
    component: dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ops-sentinel
      component: dashboard
  template:
    metadata:
      labels:
        app: ops-sentinel
        component: dashboard
    spec:
      containers:
      - name: dashboard
        image: ops-sentinel/dashboard:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: API_ENDPOINT
          value: "http://ops-sentinel-core-service:8080"
        - name: GRAFANA_URL
          value: "http://grafana-service:3000"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5